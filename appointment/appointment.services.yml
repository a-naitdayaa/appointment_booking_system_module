services:
  appointment.csv_exporter:
    class: Drupal\appointment\Service\AppointmentCsvExporter
    arguments:
      - '@entity_type.manager'
      - '@file_url_generator'

  appointment.mailer:
    class: Drupal\appointment\Service\AppointmentMailer
    arguments:
      - '@plugin.manager.mail'
      - '@language_manager'
      - '@logger.factory'
